<!DOCTYPE html>
<html>

<head>
    <title>Election Guide AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🗳️ Election Guide</h1>
        <p class="subtitle">Let’s figure out where you are in the voting process</p>

        <!-- PROGRESS BAR -->
        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <!-- STEP WIZARD -->
        <div class="card" id="wizard">
            <h2 id="question">Are you registered as a voter?</h2>

            <div class="options">
                <button onclick="answer('yes')">Yes</button>
                <button onclick="answer('no')">No</button>
            </div>
        </div>

        <!-- RESULT -->
        <div id="resultCard" class="card hidden"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
