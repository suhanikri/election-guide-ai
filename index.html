<!DOCTYPE html>
<html>

<head>
    <title>Election Guide AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🗳️ Election Guide AI</h1>
        <p class="subtitle">
            Not sure how voting works? This AI guides you step-by-step — like a friend who’s done it before.
        </p>

        <button class="start-btn" onclick="startJourney()">✨ Start My Voting Journey</button>

        <!-- Journey Section -->
        <div id="journeyBox" class="card hidden">
            <h2>📌 Your Voting Journey</h2>
            <div id="journeySteps"></div>
        </div>

        <!-- Scenarios -->
        <div class="card">
            <h2>⚡ Common Situations</h2>
            <div class="quick-buttons">
                <button onclick="handleScenario('first')">First Time Voter</button>
                <button onclick="handleScenario('lost')">Lost Voter ID</button>
                <button onclick="handleScenario('booth')">Find Booth</button>
            </div>
        </div>

        <!-- Chat -->
        <div class="card">
            <h2>💬 Ask Election AI</h2>
            <div id="chatBox" class="chat-box"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask anything about elections...">
                <button onclick="askAI()">Send</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
