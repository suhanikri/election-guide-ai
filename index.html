<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Guide AI</title>
    <!-- Importing Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app-container">
        <!-- Header Section -->
        <header class="hero-section">
            <h1 class="gradient-text">Election Guide AI</h1>
            <p class="subtitle">Your intelligent, step-by-step voting assistant.</p>
        </header>

        <!-- Chat Interface -->
        <section class="chat-container">
            <div class="chat-window" id="chat-window">
                <!-- AI Welcome Message -->
                <div class="message ai-message">
                    <p>Hey. I'm here to help you navigate the election process. Are you a first-time voter, looking for
                        your polling booth, or something else?</p>
                </div>
            </div>

            <!-- Quick Action Chips -->
            <div class="quick-actions">
                <button class="action-chip" onclick="sendQuickReply('First Time Voter')">First Time Voter</button>
                <button class="action-chip" onclick="sendQuickReply('Lost Voter ID')">Lost Voter ID</button>
                <button class="action-chip" onclick="sendQuickReply('Find Booth')">Find Booth</button>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask anything about elections...">
                <button id="send-btn">Send</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
