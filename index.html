<!DOCTYPE html>
<html>

<head>
    <title>Election Guide AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🗳️ Election Guide AI</h1>
        <p class="subtitle">Understand elections in the simplest way</p>

        <!-- Steps -->
        <div class="card">
            <h2>📌 Election Journey</h2>
            <div class="steps">
                <div class="step">🧾 Register as voter</div>
                <div class="step">🪪 Get voter ID</div>
                <div class="step">📍 Find polling booth</div>
                <div class="step">🗳️ Vote on election day</div>
                <div class="step">📊 Results declared</div>
            </div>
        </div>

        <!-- Chat UI -->
        <div class="card">
            <h2>💬 Ask Election AI</h2>

            <div id="chatBox" class="chat-box"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask anything...">
                <button onclick="askAI()">Send</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
